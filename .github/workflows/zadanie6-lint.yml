name: Zadanie 6 Lint

on:
  push:
    paths:
      - "6/**"
      - ".github/workflows/zadanie6-lint.yml"
  pull_request:
    paths:
      - "6/**"
      - ".github/workflows/zadanie6-lint.yml"

defaults:
  run:
    working-directory: 6

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 6/frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: 6/frontend

      - name: ESLint
        run: npm run lint
        working-directory: 6/frontend

      - name: gofmt
        run: test -z "$(gofmt -l .)"
        working-directory: 6/backend

      - name: go vet
        run: go vet ./...
        working-directory: 6/backend

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: 6/backend
          args: --timeout=3m

      - name: gocat tests
        run: go test ./...
        working-directory: 6/oss/gocat
